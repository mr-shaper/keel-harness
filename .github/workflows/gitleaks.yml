name: Gitleaks Secret Scan

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:
    branches:
      - main
      - "feature/**"

jobs:
  gitleaks-scan:
    name: Detect Secrets with Gitleaks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks binary
        run: |
          GITLEAKS_VERSION="8.24.3"
          curl -sSL "https://github.com/zricethezav/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o /tmp/gitleaks.tar.gz
          sudo tar -xz -C /usr/local/bin -f /tmp/gitleaks.tar.gz gitleaks
          gitleaks version

      - name: Run gitleaks (filesystem scan, --no-git sidesteps first-commit range bug)
        run: |
          gitleaks detect \
            --source . \
            --no-git \
            --verbose \
            --redact \
            --exit-code 1

      - name: Scan summary (success)
        if: success()
        run: |
          echo "============================================"
          echo "  Gitleaks scan PASSED — 0 secrets found"
          echo "  Safe to merge."
          echo "============================================"
